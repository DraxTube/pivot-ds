name: Build NDS Rom

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build PivotDS
      run: make
      
    - name: Upload NDS file
      uses: actions/upload-artifact@v4
      with:
        name: pivotds_rom
        path: "*.nds"
        if-no-files-found: error
